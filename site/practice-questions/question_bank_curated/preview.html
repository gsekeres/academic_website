<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Curated Practice Question Preview</title>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["\\(", "\\)"]],
        displayMath: [["\\[", "\\]"]]
      },
      svg: { fontCache: "global" }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f5;
      --ink: #191919;
      --muted: #65635d;
      --line: #d9d7ce;
      --panel: #ffffff;
      --accent: #245f73;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }

    main {
      width: min(980px, calc(100vw - 32px));
      margin: 32px auto;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
      margin-bottom: 24px;
    }

    select,
    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      font: inherit;
      padding: 8px 10px;
    }

    button {
      background: var(--accent);
      color: white;
      cursor: pointer;
    }

    article {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
    }

    h1 {
      font-size: 24px;
      margin: 0;
    }

    h2 {
      font-size: 22px;
      margin: 0 0 8px;
    }

    .meta,
    .objective {
      color: var(--muted);
      font-size: 14px;
    }

    .block {
      border-top: 1px solid var(--line);
      margin-top: 18px;
      padding-top: 18px;
    }

    .block h3 {
      font-size: 14px;
      letter-spacing: 0.04em;
      margin: 0 0 8px;
      text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <div class="toolbar">
      <div>
        <h1>Curated Practice Question Preview</h1>
        <div id="count" class="meta">Loading questions...</div>
      </div>
      <div>
        <select id="selector" aria-label="Question selector"></select>
        <button id="random" type="button">Random</button>
      </div>
    </div>
    <article id="question"></article>
  </main>

  <script>
    const state = { questions: [] };

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderText(value) {
      return escapeHtml(value)
        .split(/\n{2,}/)
        .map((paragraph) => `<p>${paragraph.replace(/\n/g, "<br>")}</p>`)
        .join("");
    }

    function renderQuestion(question) {
      const target = document.getElementById("question");
      target.innerHTML = `
        <h2>${escapeHtml(question.title)}</h2>
        <div class="meta">${escapeHtml(question.main_domain)} / ${escapeHtml(question.subdomain)} / ${escapeHtml(question.difficulty)}</div>
        <div class="objective">${escapeHtml(question.learning_objective)}</div>
        <div class="block"><h3>Preliminaries</h3>${renderText(question.preliminaries)}</div>
        <div class="block"><h3>Question</h3>${renderText(question.question)}</div>
        <div class="block"><h3>Solution</h3>${renderText(question.solution)}</div>
      `;
      if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise([target]);
      }
    }

    function selectQuestion(index) {
      const question = state.questions[index];
      if (!question) return;
      document.getElementById("selector").value = String(index);
      renderQuestion(question);
    }

    fetch("practice-questions.curated.json")
      .then((response) => {
        if (!response.ok) throw new Error("Could not load curated bank.");
        return response.json();
      })
      .then((questions) => {
        state.questions = questions;
        document.getElementById("count").textContent = `${questions.length} curated questions`;
        const selector = document.getElementById("selector");
        selector.innerHTML = questions.map((question, index) => {
          return `<option value="${index}">${escapeHtml(question.id)}</option>`;
        }).join("");
        selector.addEventListener("change", () => selectQuestion(Number(selector.value)));
        document.getElementById("random").addEventListener("click", () => {
          selectQuestion(Math.floor(Math.random() * state.questions.length));
        });
        selectQuestion(0);
      })
      .catch((error) => {
        document.getElementById("count").textContent = error.message;
      });
  </script>
</body>
</html>
